version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: careforge-db
    environment:
      POSTGRES_USER: careforge
      POSTGRES_PASSWORD: careforge_dev_2024
      POSTGRES_DB: careforge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U careforge']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: careforge-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: careforge-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: careforge_admin
      MINIO_ROOT_PASSWORD: careforge_storage_2024
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: careforge-mail
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
  redis_data:
  minio_data:
